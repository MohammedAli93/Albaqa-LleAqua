# SPA static serving for screen / controller / admin.
# `${PORT}` is substituted at container start (nginx envsubst on templates) so the
# server binds whatever port Railway injects. Defaults to 80 locally (ENV PORT).
server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Gzip (brotli if the image supports it).
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Security headers.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;

  # SPA fallback — every route resolves to index.html. The shell is served from
  # THIS block for the real entry points (`/`, `/?c=ROOM`, deep links), not just
  # the literal `/index.html`. So the no-cache headers MUST live here: putting
  # them only on `location = /index.html` left `/` uncached, so phones kept
  # serving a stale shell → an old JS bundle → "the site didn't update".
  # The hashed files under /assets/ stay long-cached (handled above).
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
  }
}
