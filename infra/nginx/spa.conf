# SPA static serving for screen / controller / admin.
# `${PORT}` is substituted at container start (nginx envsubst on templates) so the
# server binds whatever port Railway injects. Defaults to 80 locally (ENV PORT).
server {
  listen ${PORT};
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Gzip (brotli if the image supports it).
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Security headers.
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;

  # Never cache the SPA shell, so a new deploy shows up on the next load
  # (the hashed /assets/ it points to are still long-cached). Without this a
  # browser/proxy can keep serving an old index.html → "site didn't update".
  location = /index.html {
    add_header Cache-Control "no-cache, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    try_files $uri =404;
  }

  # SPA fallback — every route resolves to index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
